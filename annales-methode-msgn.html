%94%20Pr%C3%A9sentez%20votre%20r%C3%A9ponse%20sous%20forme%20de%20tableau%20%C3%A0%20deux%20colonnes%20(Forces%20%2F%20Faiblesses)%2C%20c'est%20plus%20lisible%20et%20cela%20montre%20que%20vous%20ma%C3%AEtrisez%20l'outil.%20Pour%20chaque%20%C3%A9l%C3%A9ment%20cit%C3%A9%2C%20appuyez-vous%20sur%20un%20fait%20pr%C3%A9cis%20tir%C3%A9%20des%20documents.%0A%0A%F0%9F%93%9D%20**Sur%20la%20copie**%20%E2%80%94%0A%0ALe%20diagnostic%20interne%20de%20l'entreprise%20Fr%C3%A9d%C3%A9ric%20M%20permet%20d'identifier%20ses%20forces%20et%20ses%20faiblesses.%0A%0A%7C%20Cat%C3%A9gorie%20%7C%20Forces%20%7C%20Faiblesses%20%7C%0A%7C---%7C---%7C---%7C%0A%7C%20**Ressources%20humaines**%20%7C%20Recrutement%20de%20salari%C3%A9s%20sp%C3%A9cialis%C3%A9s%20dans%20la%20num%C3%A9risation%20%3B%2066%20salari%C3%A9s%20exp%C3%A9riment%C3%A9s%20travaillant%20dans%20l'usine%20de%20P%C3%A9gomas%20%7C%20%7C%0A%7C%20**Ressources%20financi%C3%A8res**%20%7C%20Autonomie%20financi%C3%A8re%20permettant%20l'autofinancement%20des%20investissements%20%7C%20%7C%0A%7C%20**Ressources%20mat%C3%A9rielles**%20%7C%20Une%20usine%20%C3%A0%20P%C3%A9gomas%20assurant%20la%20fabrication%20et%20le%20contr%C3%B4le%20qualit%C3%A9%20des%20produits%20%3B%20le%20Domaine%20de%20la%20Fray%C3%A8re%2C%20%C3%A9tendu%20sur%20plusieurs%20hectares%2C%20permettant%20la%20culture%20de%20fleurs%20rares%20et%20donc%20une%20mati%C3%A8re%20premi%C3%A8re%20de%20qualit%C3%A9%20%7C%20%7C%0A%7C%20**Ressources%20immat%C3%A9rielles**%20%7C%20Image%20reconnue%20d'une%20entreprise%20proposant%20des%20produits%20naturels%20de%20qualit%C3%A9%20%3B%20d%C3%A9veloppement%20du%20site%20de%20vente%20en%20ligne%20%3B%20culture%20forte%20favorable%20%C3%A0%20l'innovation%20%7C%20Absence%20de%20label%20BIO%2C%20sauf%20pour%20la%20nouvelle%20gamme%20%C2%AB%20Body%20Language%20%C2%BB%20%7C%0A%7C%20**Comp%C3%A9tences%20professionnelles**%20%7C%20Forte%20capacit%C3%A9%20d'innovation%20dans%20la%20conception%20des%20produits%20%3B%20expertise%20en%20cr%C3%A9ation%20de%20     document.querySelector('.content').scrollIntoView({behavior:'smooth',block:'start'});
  }));
</script>
</body>
